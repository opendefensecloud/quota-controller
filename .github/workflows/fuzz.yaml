name: Fuzz

permissions:
  contents: read

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      fuzztime:
        description: "Time budget per fuzz target (Go duration, e.g. 5m, 30m)"
        required: false
        default: "5m"

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fieldpath
            package: ./internal/fieldpath/...
            target: FuzzResolve
          - name: webhook
            package: ./internal/webhook/...
            target: FuzzObjectFromRequest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run fuzz
        env:
          FUZZTIME: ${{ inputs.fuzztime || '5m' }}
          PACKAGE: ${{ matrix.package }}
          TARGET: ${{ matrix.target }}
        run: |
          go test -run='^$' -fuzz="^${TARGET}$" -fuzztime="${FUZZTIME}" "${PACKAGE}"
      - name: Upload discovered corpus on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus-${{ matrix.name }}
          path: |
            **/testdata/fuzz/**
          if-no-files-found: ignore
