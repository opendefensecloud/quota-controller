name: Publish Helm Chart

permissions: read-all

on:
  release:
    types:
      - published
  push:
    tags:
      - v*
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
    types: [labeled, unlabeled, opened, synchronize, reopened]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ok-to-helm')) ||
      (github.event_name == 'release' && github.event.action == 'published')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Generate manifests
        run: make manifests

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to GHCR (Docker)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR (Helm)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: echo "$GH_TOKEN" | helm registry login ghcr.io -u "$GH_ACTOR" --password-stdin

      - name: Extract version from tag
        id: version
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ "$GH_REF" == refs/tags/* ]]; then
            VERSION="${GH_REF_NAME#v}"
            echo "source=tag" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GH_SHA:0:7}"
            VERSION="0.0.0-pr.${PR_NUMBER}.${SHORT_SHA}"
            echo "source=computed" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${VERSION}"

      - name: Update chart version and appVersion
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for chart in charts/*/; do
            if [ -f "${chart}Chart.yaml" ]; then
              CHART_NAME=$(basename "${chart}")
              echo "Updating ${CHART_NAME} to version ${VERSION}"
              sed -i "s|^version:.*|version: ${VERSION}|" "${chart}Chart.yaml"
              sed -i "s|^appVersion:.*|appVersion: \"${VERSION}\"|" "${chart}Chart.yaml"
              echo "Updated Chart.yaml:"
              grep -E '^(version|appVersion):' "${chart}Chart.yaml"
            fi
          done

      - name: Package and publish Helm charts
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          for chart in charts/*/; do
            if [ -f "${chart}Chart.yaml" ]; then
              CHART_NAME=$(basename "${chart}")
              echo "Packaging and publishing chart: ${CHART_NAME}"
              helm package "${chart}"
              PACKAGE=$(ls "${CHART_NAME}"-*.tgz)
              helm push "${PACKAGE}" "oci://ghcr.io/${REPO_OWNER}/charts" 2>&1 | tee push-metadata.txt
              echo "Published ${PACKAGE} to ghcr.io/${REPO_OWNER}/charts"
              CHART_DIGEST=$(awk '/Digest: /{print $2}' push-metadata.txt)
              if [ -z "${CHART_DIGEST}" ]; then
                echo "ERROR: failed to extract chart digest from helm push output" >&2
                exit 1
              fi
              echo "CHART_DIGEST=${CHART_DIGEST}" | tee -a "$GITHUB_ENV"
              cosign sign --yes "ghcr.io/${REPO_OWNER}/charts/${CHART_NAME}@${CHART_DIGEST}"
            fi
          done
