apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - apiresourceschema-consumptionquotas.quota.opendefense.cloud.yaml
  # QuotaUsage is the INTERNAL accounting type used by the quota-controller.
  # It is applied to the quota-ctrl workspace but intentionally NOT referenced
  # by the quota-provider APIExport — consumers never see this resource.
  - apiresourceschema-quotausages.quota.opendefense.cloud.yaml
  - apiexport-quota-provider.yaml
