    # an apiexports?labelSelector=ui.platform-mesh.io/content-for=<providermetadata-name>.
    # Value MUST equal the ProviderMetadata name (s3.example.com) or no tile is rendered.
    ui.platform-mesh.io/content-for: s3.example.com
spec:
  resources:
    - group: s3.example.com
      name: buckets
      schema: v1.buckets.s3.example.com
      storage:
        crd: {}
